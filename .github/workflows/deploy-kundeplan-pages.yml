name: Deploy Kundeplan to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'kundeplan/**'
      - '.github/workflows/deploy-kundeplan-pages.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kundeplan/package-lock.json

      - name: Install dependencies
        working-directory: kundeplan
        run: npm ci

      - name: Build app
        working-directory: kundeplan
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: kundeplan/dist
          force_orphan: true
